name: baseerah
description: "Baseerah (بصيرة) — proactive FinTech early-warning app (consumer + bank shells)."
# Prevent accidental publication to pub.dev — this is a private app package.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  # Localization delegates (Arabic-first, RTL) — SDK package.
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management (locked project-wide — see README "State-management decision").
  flutter_riverpod: ^2.6.1
  # HTTP client for the local backend API.
  dio: ^5.7.0
  # Declarative routing for the two shells.
  go_router: ^14.6.2
  # Message/number/date formatting; backs gen-l10n. Pinned by flutter_localizations.
  intl: ^0.20.2
  # IBM Plex Sans + IBM Plex Sans Arabic fonts, fetched at runtime.
  google_fonts: ^6.2.1
  # Invoice-image capture for the "Ask Baseerah AI" chat tab (Step 3.5). Endorsed
  # federated plugins cover mobile, web and desktop, so the local demo runs
  # everywhere `flutter run` targets.
  image_picker: ^1.1.2
  # Persists the chosen locale across a full reload/restart (QA UI-07). Federated
  # plugin backs web (localStorage), mobile and desktop.
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  # Generate the localized AppLocalizations from lib/l10n/*.arb (see l10n.yaml).
  generate: true
  assets:
    # Bank marks, one per banks.logo_slug. Bundled rather than fetched: the accounts list must render
    # offline and on first paint, and the app never calls a third-party host at runtime.
    # Third-party trademarks — read docs/bank-logos.md before adding or redistributing any. Keep this
    # directory to image files only: everything in it is published with the web bundle.
    - assets/banks/
