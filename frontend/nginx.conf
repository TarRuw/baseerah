server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Reverse-proxy API calls to the backend container so the browser stays
    # same-origin (no CORS). The app is built with a relative base URL
    # (BASEERAH_API_BASE_URL=/api/v1), so requests land here as /api/v1/...
    # host.docker.internal resolves to the host gateway (see extra_hosts in
    # docker-compose.yml), where baseerah-be publishes port 8080.
    location /api/ {
        proxy_pass http://host.docker.internal:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # go_router uses client-side routing: any unknown path must fall back to
    # index.html so deep links (e.g. /consumer/home) resolve in the SPA.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the bootstrap files so new builds are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
