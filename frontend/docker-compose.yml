services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: baseerah-web
    ports:
      # Visit http://localhost:5002 to view the app.
      # (8080 is taken by the baseerah-be backend container.)
      - "5002:80"
    # Lets nginx reach the backend (published on the host's 8080) via
    # host.docker.internal from inside the container.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
