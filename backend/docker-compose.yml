services:
  postgres:
    image: postgres:16
    container_name: baseerah-postgres
    environment:
      POSTGRES_DB: baseerah
      POSTGRES_USER: baseerah
      POSTGRES_PASSWORD: baseerah
    ports:
      - "5432:5432"
    volumes:
      - baseerah-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baseerah -d baseerah"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  baseerah-pgdata:
