# --- GenAI chat reply ---
chat.generic=حلّلت تدفّقك النقدي خلال آخر 24 شهرًا. درجة صحتك المالية هي {0} ({1})، بدخل شهري يقارب {2} ريال ومصروفات {3} ريال شهريًا (~{4} ريال فائض). اسأل عن قرار محدّد، أو افتح تبويب القدرة على تحمّل القرض لمعرفة أثره الدقيق على توقّعاتك.
chat.scenario.affordable=إيجار سيارة بـ 2,100 ريال شهريًا سيستهلك نحو {0}٪ من فائضك الشهري البالغ ~{1} ريال.\n\n• درجة صحتك المالية الحالية هي {2} ({3}).\n• رؤية 3 أشهر: يتكرّر الدفع كل دورة ويستنزف احتياطيك تدريجيًا.\n• رؤية 12 شهرًا: استمرار هذا الضغط يدفع درجة صحتك نحو الفئة الأدنى.\n\nالتوصية: أبقِ الدفعة تحت {4} ريال شهريًا، أو افتح تبويب القدرة على تحمّل القرض لمعرفة القسط الدقيق وأثره على الدرجة.
chat.scenario.unsustainable=إيجار سيارة بـ 2,100 ريال شهريًا غير مستدام الآن — مصروفاتك المتكرّرة تعادل دخلك أو تتجاوزه، فلا فائض شهري لاستيعابه.\n\n• درجة صحتك المالية الحالية هي {0} ({1}).\n• أي دفعة ثابتة جديدة ستقدّم أول عجز في السيولة في كل دورة.\n\nالتوصية: حرّر فائضًا أولًا، أو استخدم تبويب القدرة على تحمّل القرض لتجربة مبلغ أصغر.
chat.invoice.action=سجّل هذه المصروفات البالغة {0} ريال وتحقّق من أثرها على توقّعات 30 يومًا. (وضع تجريبي — اربط مزوّد ذكاء اصطناعي لقراءة الفواتير فعليًا.)

