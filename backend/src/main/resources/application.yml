spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/baseerah
    username: baseerah
    password: baseerah
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

baseerah:
  seed:
    # Directory of data-mocks/*.json SAMA payloads. Resolved relative to the working dir; the seeder
    # also searches parent dirs, so running from backend/ still finds the repo-root data-mocks/.
    data-mocks-path: data-mocks
    enabled: true
  genai:
    # GenAiClient provider (DESIGN §2): mock (default, deterministic, needs no API key) | remote (Phase 7).
    # Overridable via the GENAI_PROVIDER env var; falls back to mock so the demo runs offline.
    provider: ${GENAI_PROVIDER:mock}
    # RemoteGenAi settings (Step 7.2). Only consulted when provider=remote AND api-key is non-blank;
    # otherwise the app cleanly falls back to the mock. No secret is hardcoded — all env-driven.
    remote:
      model: ${GENAI_MODEL:claude-opus-4-8}
      base-url: ${GENAI_BASE_URL:https://api.anthropic.com}
      api-key: ${GENAI_API_KEY:}
      max-tokens: ${GENAI_MAX_TOKENS:1024}
      version: ${GENAI_VERSION:2023-06-01}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
