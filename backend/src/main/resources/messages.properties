# Baseerah server-provided content strings — English (default bundle).
#
# These are the *content* strings the API emits (verdicts, chat replies, rescue options, challenge copy),
# resolved per request from the Accept-Language header (Step 8.1, QA finding I18N-01/COPY-01). Validation
# error messages localise elsewhere; this bundle is the content seam. The Arabic counterpart is
# messages_ar.properties. Any locale other than Arabic falls back to this default bundle.
#
# MessageFormat note: values interpolated with {n} arguments run through java.text.MessageFormat, so a
# literal apostrophe MUST be doubled ('') and numeric arguments are passed pre-formatted (Western digits,
# thousands-grouped) so grouping never changes between locales.

# --- Financial health zones (used inside the grounded chat reply) ---
zone.OPTIMAL=Optimal
zone.WARNING=Warning
zone.CRITICAL=Critical

# --- Loan affordability verdict (LoanCalculator, DESIGN 5.3) ---
loan.verdict.comfortable=Comfortably affordable
loan.verdict.strains=Strains liquidity
loan.verdict.notAffordable=Not affordable

# --- GenAI chat reply (MockGenAi, FR-03) ---
# {0} score  {1} zone label  {2} monthly income  {3} monthly outflow  {4} monthly surplus
chat.generic=I analyzed your last 24 months of cash flow. Your health score is {0} ({1}), with roughly {2} SAR coming in and {3} SAR going out each month (~{4} SAR surplus). Ask about a specific decision, or open the Loan Affordability tab to see its exact impact on your forecast.
# {0} % of surplus  {1} surplus  {2} score  {3} zone label  {4} comfortable cap
chat.scenario.affordable=A 2,100 SAR/mo lease would take about {0}% of your ~{1} SAR monthly surplus.\n\n• Your current health score is {2} ({3}).\n• 3-month view: the payment repeats every cycle and steadily erodes your buffer.\n• 12-month view: sustained strain at this level pulls your health score toward the next band down.\n\nRecommendation: keep the payment under {4} SAR/mo, or open the Loan Affordability tab for the exact installment and score impact.
# {0} score  {1} zone label
chat.scenario.unsustainable=A 2,100 SAR/mo lease is not sustainable right now — your recurring outflows already meet or exceed your income, so there is no monthly surplus to absorb it.\n\n• Your current health score is {0} ({1}).\n• Any new fixed payment would pull your first liquidity deficit earlier each cycle.\n\nRecommendation: free up surplus first, or use the Loan Affordability tab to test a smaller amount.
# Mock-mode invoice stub (no OCR); {0} amount
chat.invoice.action=Log this {0} SAR expense and check its impact on your 30-day forecast. (Mock mode — connect a GenAI provider for real invoice OCR.)

# --- Smart Rescue bridge options + confirmation (RescueService, FR-07) ---
