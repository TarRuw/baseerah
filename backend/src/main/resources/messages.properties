rescue.option.murabaha.label=Murabaha micro-finance
rescue.option.murabaha.detail=Pre-approved Sharia-compliant financing of SAR {0} repaid over {1} months.
# {0} amount
rescue.option.liquidate.label=Liquidate fund assets
rescue.option.liquidate.detail=Liquidate SAR {0} of safe investment-fund assets to cover the shortfall — no financing cost.
# {0} option type  {1} amount  {2} score before  {3} score after
rescue.confirm=Confirmed {0} bridge of SAR {1} — projected stress score recovers {2} → {3}.

